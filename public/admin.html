<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Taller de Fotografía</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .admin-header {
      padding: 24px 0 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .admin-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .admin-body { padding-bottom: 48px; }
    .card-overflow { overflow-x: auto; }
    .print-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted-2);
      font-size: 0.8rem;
    }
    .print-count strong { color: var(--text); }
    .job-date { font-size: 0.78rem; color: var(--muted-2); }
  </style>
</head>
<body class="page">

  <div class="container">
    <header class="admin-header">
      <div>
        <p style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Panel de control</p>
        <h1 class="title" style="font-size:clamp(1.4rem,4vw,2rem)">Impresión</h1>
        <div class="admin-meta">
          <span class="sse-pill" id="sse-pill">
            <span class="dot dot-warn" id="sse-dot"></span>
            <span id="sse-label">Conectando…</span>
          </span>
          <span class="count-badge" id="count-badge" style="display:inline-block;background:var(--surface-2);border:1px solid var(--border);color:var(--muted-2);font-size:0.78rem;font-weight:600;padding:3px 10px;border-radius:100px">—</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:4px">
        <button id="logout-btn" class="btn-secondary">Cerrar sesión</button>
        <a href="/gallery" style="color:var(--muted-2);font-size:0.8rem;text-decoration:none;font-weight:600">Ver galería →</a>
      </div>
    </header>

    <main class="admin-body">

      <!-- Desktop: table -->
      <div class="admin-desktop card card-overflow">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Foto</th>
              <th>#</th>
              <th>Alumno</th>
              <th>Subido</th>
              <th>Estado</th>
              <th>Impresiones</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="jobs-table-body"></tbody>
        </table>
        <div id="table-empty" class="empty-state hidden">
          <div class="icon">🖨️</div>
          <p>No hay trabajos todavía.</p>
        </div>
      </div>

      <!-- Mobile: cards -->
      <div class="admin-mobile">
        <div class="job-card-wrap" id="jobs-cards"></div>
        <div id="cards-empty" class="empty-state hidden">
          <div class="icon">🖨️</div>
          <p>No hay trabajos todavía.</p>
        </div>
      </div>

    </main>
  </div>

  <script>
    const tableBody  = document.getElementById('jobs-table-body');
    const cardsWrap  = document.getElementById('jobs-cards');
    const tableEmpty = document.getElementById('table-empty');
    const cardsEmpty = document.getElementById('cards-empty');
    const sseDot     = document.getElementById('sse-dot');
    const sseLabel   = document.getElementById('sse-label');
    const countBadge = document.getElementById('count-badge');
    const logoutBtn  = document.getElementById('logout-btn');

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(str) {
      return new Date(str).toLocaleString('es-CL', {
        day:'2-digit', month:'2-digit', year:'2-digit',
        hour:'2-digit', minute:'2-digit'
      });
    }

    function badgeHtml(status) {
      return status === 'printed'
        ? '<span class="badge badge-printed">Impreso</span>'
        : '<span class="badge badge-pending">Pendiente</span>';
    }

    async function printJob(id, btn) {
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = 'Enviando…';
      try {
        const res  = await fetch(`/admin/print/${id}`, { method: 'POST' });
        const data = await res.json();
        if (!data.success) alert(data.error || 'Error en la impresión.');
        else loadJobs();
      } catch {
        alert('Error de conexión con el servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    }

    function renderJobs(jobs) {
      tableBody.innerHTML = '';
      cardsWrap.innerHTML = '';

      if (!jobs.length) {
        tableEmpty.classList.remove('hidden');
        cardsEmpty.classList.remove('hidden');
        countBadge.textContent = '0 trabajos';
        return;
      }

      tableEmpty.classList.add('hidden');
      cardsEmpty.classList.add('hidden');
      countBadge.textContent = jobs.length === 1 ? '1 trabajo' : `${jobs.length} trabajos`;

      jobs.forEach((job) => {
        const thumb = `/uploads/${escHtml(job.filename)}`;

        // ── Table row (desktop) ──
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><img class="thumb" src="${thumb}" alt="${escHtml(job.alumno)}" loading="lazy" /></td>
          <td class="text-muted">${job.id}</td>
          <td>
            <div class="job-name">${escHtml(job.alumno)}</div>
            <div class="job-course">${escHtml(job.curso)}</div>
          </td>
          <td class="job-date">${fmtDate(job.uploaded_at)}</td>
          <td>${badgeHtml(job.status)}</td>
          <td class="print-count"><strong>${job.print_count}</strong> vez</td>
          <td><button class="btn btn-print" data-id="${job.id}">🖨 Imprimir</button></td>
        `;
        tr.querySelector('[data-id]').addEventListener('click', function() {
          printJob(job.id, this);
        });
        tableBody.appendChild(tr);

        // ── Mobile card ──
        const card = document.createElement('div');
        card.className = 'job-card fade-up';
        card.innerHTML = `
          <img class="thumb" src="${thumb}" alt="${escHtml(job.alumno)}" loading="lazy" />
          <div class="info" style="flex:1;min-width:0">
            <div class="name">${escHtml(job.alumno)}</div>
            <div class="meta">${escHtml(job.curso)} · ${fmtDate(job.uploaded_at)}</div>
            <div class="card-footer">
              ${badgeHtml(job.status)}
              <span class="print-count"><strong>${job.print_count}</strong>×</span>
              <button class="btn btn-print" style="margin-left:auto" data-id="${job.id}">🖨 Imprimir</button>
            </div>
          </div>
        `;
        card.querySelector('[data-id]').addEventListener('click', function() {
          printJob(job.id, this);
        });
        cardsWrap.appendChild(card);
      });
    }

    async function loadJobs() {
      try {
        const res  = await fetch('/admin/api/jobs');
        const jobs = await res.json();
        renderJobs(jobs);
      } catch (err) {
        console.error(err);
      }
    }

    // ── SSE ───────────────────────────────────
    const es = new EventSource('/events');

    es.addEventListener('connected', () => {
      sseDot.className = 'dot dot-ok';
      sseLabel.textContent = 'Conectado';
    });

    es.addEventListener('new-photo', () => {
      loadJobs();
    });

    es.addEventListener('print-update', () => {
      loadJobs();
    });

    es.onerror = () => {
      sseDot.className = 'dot dot-warn';
      sseLabel.textContent = 'Reconectando…';
    };

    // ── Logout ───────────────────────────────
    logoutBtn.addEventListener('click', async () => {
      await fetch('/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });

    loadJobs();
  </script>
</body>
</html>
