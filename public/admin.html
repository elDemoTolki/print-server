<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Electivo de Fotografía y Multimedia</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script>if(localStorage.getItem('pf-theme')==='sakura')document.documentElement.classList.add('theme-sakura');</script>
  <style>
    .admin-header {
      padding: 24px 0 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .admin-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .greeting {
      font-size: 0.8rem;
      color: var(--muted-2);
      margin-top: 2px;
    }
    .greeting strong { color: var(--accent); font-weight: 700; }
    .admin-body { padding-bottom: 48px; }
    .card-overflow { overflow-x: auto; }
    .print-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted-2);
      font-size: 0.8rem;
    }
    .print-count strong { color: var(--text); }
    .job-date { font-size: 0.78rem; color: var(--muted-2); }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filters input,
    .filters select {
      max-width: 200px;
      width: auto;
      flex: 1;
      min-width: 130px;
      padding: 9px 14px;
      font-size: 0.875rem;
    }
    .filters select { padding-right: 36px; }
    .filter-count {
      font-size: 0.8rem;
      color: var(--muted-2);
      align-self: center;
      white-space: nowrap;
    }

    /* Delete button */
    .btn-delete {
      background: transparent;
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      padding: 6px 12px;
      min-height: unset;
      height: 34px;
      width: auto;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--trans);
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-delete:hover:not(:disabled) {
      background: rgba(239,68,68,0.12);
      border-color: var(--red);
    }
    .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }

    .actions-cell { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body class="page">

  <div class="container">
    <header class="admin-header">
      <div>
        <p style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Panel de control</p>
        <h1 class="title" style="font-size:clamp(1.4rem,4vw,2rem)">Impresión</h1>
        <p class="greeting">Hola, <strong>Nicol Valencia C.</strong> 👋</p>
        <div class="admin-meta">
          <span class="sse-pill" id="sse-pill">
            <span class="dot dot-warn" id="sse-dot"></span>
            <span id="sse-label">Conectando…</span>
          </span>
          <span id="count-badge" style="display:inline-block;background:var(--surface-2);border:1px solid var(--border);color:var(--muted-2);font-size:0.78rem;font-weight:600;padding:3px 10px;border-radius:100px">—</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:4px">
        <button id="logout-btn" class="btn-secondary">Cerrar sesión</button>
        <a href="/gallery" style="color:var(--muted-2);font-size:0.8rem;text-decoration:none;font-weight:600">Ver galería →</a>
      </div>
    </header>

    <main class="admin-body">

      <!-- Filters -->
      <div class="filters">
        <input type="text" id="filter-alumno" placeholder="Buscar alumno…" />
        <select id="filter-curso">
          <option value="">Todos los cursos</option>
          <option value="3 Medio A">3 Medio A</option>
          <option value="3 Medio B">3 Medio B</option>
          <option value="3 Medio C">3 Medio C</option>
          <option value="3 Medio D">3 Medio D</option>
          <option value="3 Medio E">3 Medio E</option>
          <option value="3 Medio F">3 Medio F</option>
        </select>
        <select id="filter-mes">
          <option value="">Todos los meses</option>
        </select>
        <span class="filter-count" id="filter-count"></span>
      </div>

      <!-- Desktop: table -->
      <div class="admin-desktop card card-overflow">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Foto</th>
              <th>#</th>
              <th>Alumno</th>
              <th>Subido</th>
              <th>Estado</th>
              <th>Impresiones</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="jobs-table-body"></tbody>
        </table>
        <div id="table-empty" class="empty-state hidden">
          <div class="icon">🖨️</div>
          <p>Sin resultados.</p>
        </div>
      </div>

      <!-- Mobile: cards -->
      <div class="admin-mobile">
        <div class="job-card-wrap" id="jobs-cards"></div>
        <div id="cards-empty" class="empty-state hidden">
          <div class="icon">🖨️</div>
          <p>Sin resultados.</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb" role="dialog" aria-modal="true">
    <div class="lb-backdrop" id="lb-backdrop"></div>
    <div class="lb-content">
      <button class="lb-close" id="lb-close" aria-label="Cerrar">✕</button>
      <img class="lb-img" id="lb-img" alt="" />
      <div class="lb-caption" id="lb-caption"></div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>
  </div>
  <button class="lb-nav lb-prev" id="lb-prev" aria-label="Anterior" style="display:none">&#8592;</button>
  <button class="lb-nav lb-next" id="lb-next" aria-label="Siguiente" style="display:none">&#8594;</button>

  <script>
    const tableBody  = document.getElementById('jobs-table-body');
    const cardsWrap  = document.getElementById('jobs-cards');
    const tableEmpty = document.getElementById('table-empty');
    const cardsEmpty = document.getElementById('cards-empty');
    const sseDot     = document.getElementById('sse-dot');
    const sseLabel   = document.getElementById('sse-label');
    const countBadge = document.getElementById('count-badge');
    const logoutBtn  = document.getElementById('logout-btn');
    const filterAlumno = document.getElementById('filter-alumno');
    const filterCurso  = document.getElementById('filter-curso');
    const filterMes    = document.getElementById('filter-mes');
    const filterCount  = document.getElementById('filter-count');

    let allJobs = [];

    // ── Mes helpers ───────────────────────────
    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    function monthKey(dateStr) {
      const utc = dateStr.includes('Z') || dateStr.includes('+')
        ? dateStr : dateStr.replace(' ', 'T') + 'Z';
      const d = new Date(utc);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    function monthLabel(key) {
      const [y, m] = key.split('-');
      return `${MESES[parseInt(m,10)-1]} ${y}`;
    }
    function buildMonthSelect() {
      const current = filterMes.value;
      const keys = [...new Set(allJobs.map(j => monthKey(j.uploaded_at)))].sort().reverse();
      filterMes.innerHTML = '<option value="">Todos los meses</option>';
      keys.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = monthLabel(k);
        filterMes.appendChild(opt);
      });
      if (keys.includes(current)) filterMes.value = current;
    }

    // ── Helpers ──────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(str) {
      // Registros antiguos: "2026-03-28 20:08:00" (sin zona horaria).
      // Los normalizamos a UTC explícito para que el browser los convierta
      // correctamente a hora local, igual que los nuevos ("...Z").
      const utc = str.includes('Z') || str.includes('+')
        ? str
        : str.replace(' ', 'T') + 'Z';
      return new Date(utc).toLocaleString('es-CL', {
        day:'2-digit', month:'2-digit', year:'2-digit',
        hour:'2-digit', minute:'2-digit'
      });
    }
    function badgeHtml(status) {
      return status === 'printed'
        ? '<span class="badge badge-printed">Impreso</span>'
        : '<span class="badge badge-pending">Pendiente</span>';
    }

    // ── Filter ────────────────────────────────
    function getFiltered() {
      const q     = filterAlumno.value.trim().toLowerCase();
      const curso = filterCurso.value;
      const mes   = filterMes.value;
      return allJobs.filter(j => {
        const matchAlumno = !q     || j.alumno.toLowerCase().includes(q);
        const matchCurso  = !curso || j.curso === curso;
        const matchMes    = !mes   || monthKey(j.uploaded_at) === mes;
        return matchAlumno && matchCurso && matchMes;
      });
    }

    function applyFilters() {
      renderJobs(getFiltered());
    }

    filterAlumno.addEventListener('input',  applyFilters);
    filterCurso.addEventListener('change',  applyFilters);
    filterMes.addEventListener('change',    applyFilters);

    // ── Print ────────────────────────────────
    async function printJob(id, btn) {
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = 'Enviando…';
      try {
        const res  = await fetch(`/admin/print/${id}`, { method: 'POST' });
        const data = await res.json();
        if (!data.success) alert(data.error || 'Error en la impresión.');
        else loadJobs();
      } catch {
        alert('Error de conexión con el servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    }

    // ── Delete ───────────────────────────────
    async function deleteJob(id, alumno, btn) {
      if (!confirm(`¿Eliminar la foto de ${alumno}?\n\nEsta acción no se puede deshacer.`)) return;
      btn.disabled = true;
      btn.textContent = 'Eliminando…';
      try {
        const res  = await fetch(`/admin/jobs/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.success) {
          alert(data.error || 'Error al eliminar.');
          btn.disabled = false;
          btn.textContent = '🗑 Eliminar';
        } else {
          loadJobs();
        }
      } catch {
        alert('Error de conexión con el servidor.');
        btn.disabled = false;
        btn.textContent = '🗑 Eliminar';
      }
    }

    // ── Render ────────────────────────────────
    function renderJobs(jobs) {
      tableBody.innerHTML = '';
      cardsWrap.innerHTML = '';

      const total    = allJobs.length;
      const filtered = jobs.length;
      const isFiltering = filterAlumno.value.trim() || filterCurso.value;

      countBadge.textContent = total === 1 ? '1 trabajo' : `${total} trabajos`;
      filterCount.textContent = isFiltering
        ? `${filtered} de ${total}`
        : '';

      if (!jobs.length) {
        tableEmpty.classList.remove('hidden');
        cardsEmpty.classList.remove('hidden');
        return;
      }
      tableEmpty.classList.add('hidden');
      cardsEmpty.classList.add('hidden');

      jobs.forEach((job) => {
        const thumb = `/uploads/${escHtml(job.filename)}`;

        // ── Table row (desktop) ──
        const tr = document.createElement('tr');
        tr.dataset.id = job.id;
        tr.innerHTML = `
          <td><div class="thumb-wrap"><img class="thumb" src="${thumb}" alt="${escHtml(job.alumno)}" loading="lazy" /></div></td>
          <td class="text-muted">${job.id}</td>
          <td>
            <div class="job-name">${escHtml(job.alumno)}</div>
            <div class="job-course">${escHtml(job.curso)}</div>
          </td>
          <td class="job-date">${fmtDate(job.uploaded_at)}</td>
          <td>${badgeHtml(job.status)}</td>
          <td><span class="print-count"><strong>${job.print_count}</strong>×</span></td>
          <td>
            <div class="actions-cell">
              <button class="btn btn-print" data-action="print">🖨 Imprimir</button>
              <button class="btn-delete" data-action="delete">🗑 Eliminar</button>
            </div>
          </td>
        `;
        tr.querySelector('[data-action="print"]').addEventListener('click', function() {
          printJob(job.id, this);
        });
        tr.querySelector('[data-action="delete"]').addEventListener('click', function() {
          deleteJob(job.id, job.alumno, this);
        });
        tr.querySelector('.thumb-wrap').addEventListener('click', () => {
          openLb(jobs.indexOf(job));
        });
        tableBody.appendChild(tr);

        // ── Mobile card ──
        const card = document.createElement('div');
        card.className = 'job-card fade-up';
        card.dataset.id = job.id;
        card.innerHTML = `
          <div class="thumb-wrap"><img class="thumb" src="${thumb}" alt="${escHtml(job.alumno)}" loading="lazy" /></div>
          <div class="info" style="flex:1;min-width:0">
            <div class="name">${escHtml(job.alumno)}</div>
            <div class="meta">${escHtml(job.curso)} · ${fmtDate(job.uploaded_at)}</div>
            <div class="card-footer">
              ${badgeHtml(job.status)}
              <span class="print-count"><strong>${job.print_count}</strong>×</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <button class="btn btn-print" data-action="print" style="flex:1">🖨 Imprimir</button>
              <button class="btn-delete" data-action="delete">🗑</button>
            </div>
          </div>
        `;
        card.querySelector('[data-action="print"]').addEventListener('click', function() {
          printJob(job.id, this);
        });
        card.querySelector('[data-action="delete"]').addEventListener('click', function() {
          deleteJob(job.id, job.alumno, this);
        });
        card.querySelector('.thumb-wrap').addEventListener('click', () => {
          openLb(jobs.indexOf(job));
        });
        cardsWrap.appendChild(card);
      });
    }

    // ── Load ──────────────────────────────────
    async function loadJobs() {
      try {
        const res  = await fetch('/admin/api/jobs');
        allJobs = await res.json();
        buildMonthSelect();
        applyFilters();
      } catch (err) {
        console.error(err);
      }
    }

    // ── SSE ───────────────────────────────────
    const es = new EventSource('/events');

    es.addEventListener('connected', () => {
      sseDot.className = 'dot dot-ok';
      sseLabel.textContent = 'Conectado';
    });
    es.addEventListener('new-photo',    () => loadJobs());
    es.addEventListener('print-update', () => loadJobs());
    es.addEventListener('delete-photo', () => loadJobs());
    es.onerror = () => {
      sseDot.className = 'dot dot-warn';
      sseLabel.textContent = 'Reconectando…';
    };

    // ── Logout ───────────────────────────────
    logoutBtn.addEventListener('click', async () => {
      await fetch('/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });

    loadJobs();

    // ── Lightbox ──────────────────────────────
    const lb        = document.getElementById('lb');
    const lbImg     = document.getElementById('lb-img');
    const lbCaption = document.getElementById('lb-caption');
    const lbCounter = document.getElementById('lb-counter');
    const lbClose   = document.getElementById('lb-close');
    const lbBackdrop = document.getElementById('lb-backdrop');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');
    let   lbIndex   = 0;
    let   lbJobs    = [];   // snapshot de jobs al abrir

    function showLbPhoto(idx) {
      const job = lbJobs[idx];
      if (!job) return;
      lbIndex = idx;
      lbImg.classList.add('loading');
      const img = new Image();
      img.onload = () => { lbImg.src = img.src; lbImg.classList.remove('loading'); };
      img.src = `/uploads/${job.filename}`;
      lbImg.alt = `${job.alumno} — ${job.curso}`;
      lbCaption.innerHTML = `${escHtml(job.alumno)} <span>· ${escHtml(job.curso)}</span>`;
      lbCounter.textContent = `${idx + 1} / ${lbJobs.length}`;
      lbPrev.disabled = idx === 0;
      lbNext.disabled = idx === lbJobs.length - 1;
    }

    function openLb(idx) {
      lbJobs = getFiltered();   // usa los jobs filtrados actuales
      lbPrev.style.display = lbNext.style.display = 'flex';
      showLbPhoto(idx);
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLb() {
      lb.classList.remove('open');
      lbPrev.style.display = lbNext.style.display = 'none';
      document.body.style.overflow = '';
      setTimeout(() => { lbImg.src = ''; }, 250);
    }

    lbClose.addEventListener('click', closeLb);
    lbBackdrop.addEventListener('click', closeLb);
    lbPrev.addEventListener('click', () => { if (lbIndex > 0) showLbPhoto(lbIndex - 1); });
    lbNext.addEventListener('click', () => { if (lbIndex < lbJobs.length - 1) showLbPhoto(lbIndex + 1); });

    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowLeft'  && lbIndex > 0)               showLbPhoto(lbIndex - 1);
      if (e.key === 'ArrowRight' && lbIndex < lbJobs.length - 1) showLbPhoto(lbIndex + 1);
    });
  </script>

  <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
    <span class="theme-toggle-icon">🌸</span>
    <span class="theme-toggle-label">Modo sakura</span>
  </button>
  <script src="/js/theme.js"></script>
</body>
</html>
