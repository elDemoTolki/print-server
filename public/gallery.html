<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería — Electivo de Fotografía y Multimedia</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script>if(localStorage.getItem('pf-theme')==='sakura')document.documentElement.classList.add('theme-sakura');</script>
  <style>
    .gallery-header { padding: 28px 0 20px; }
    .gallery-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .back-link {
      color: var(--muted-2);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--trans);
      margin-top: 6px;
    }
    .back-link:hover { color: var(--text); }
    .count-badge {
      display: inline-block;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .gallery-section { padding-bottom: 48px; }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .filters input,
    .filters select {
      max-width: 200px;
      width: auto;
      flex: 1;
      min-width: 130px;
      padding: 9px 14px;
      font-size: 0.875rem;
    }
    .filters select { padding-right: 36px; }
    .filter-clear {
      background: none;
      border: none;
      color: var(--muted-2);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 8px;
      font-family: inherit;
      transition: color var(--trans);
      white-space: nowrap;
    }
    .filter-clear:hover { color: var(--text); }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
    }
    .lightbox-content {
      position: relative;
      z-index: 1;
      max-width: min(92vw, 900px);
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .lightbox.open .lightbox-content { transform: scale(1); }
    .lightbox-img {
      max-width: 100%;
      max-height: calc(92dvh - 80px);
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      display: block;
      transition: opacity 0.15s ease;
    }
    .lightbox-img.loading { opacity: 0.3; }
    .lightbox-caption {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
    }
    .lightbox-caption span { color: var(--accent); }
    .lightbox-counter {
      font-size: 0.75rem;
      color: var(--muted-2);
      margin-top: -6px;
    }
    .lightbox-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: none;
      border: none;
      color: var(--muted-2);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 6px 10px;
      transition: color var(--trans);
    }
    .lightbox-close:hover { color: #fff; }

    /* Prev / Next arrows */
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1001;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background var(--trans), opacity var(--trans);
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.15); }
    .lightbox-nav:disabled { opacity: 0.2; cursor: default; }
    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }
    @media (min-width: 600px) {
      .lightbox-prev { left: 20px; }
      .lightbox-next { right: 20px; }
    }

    /* Like button */
    .like-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.6);
      font-size: 0.76rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .like-btn:hover  { border-color: rgba(255,100,100,0.5); color: #ff6b6b; }
    .like-btn.liked  { background: rgba(255,80,80,0.15); border-color: #ff6b6b; color: #ff6b6b; }
    .like-btn:disabled { opacity: 0.5; cursor: default; }
    .photo-card-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .photo-card-info-text { min-width: 0; }
  </style>
</head>
<body class="page">

  <div class="container">
    <header class="gallery-header">
      <div class="gallery-top">
        <div>
          <h1 class="title">Galería en vivo</h1>
          <div class="accent-line"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="live-badge"><span class="dot dot-live"></span>EN VIVO</span>
          <div style="display:flex;gap:12px">
            <a href="/foto-del-mes" class="back-link">Foto del mes</a>
            <a href="/" class="back-link">← Subir foto</a>
          </div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="sse-pill" id="sse-status">
          <span class="dot dot-warn"></span>
          Conectando…
        </span>
        <span class="count-badge" id="count-badge">0 fotos</span>
      </div>
    </header>

    <section class="gallery-section">

      <!-- Filters -->
      <div class="filters">
        <input type="text" id="filter-alumno" placeholder="Buscar alumno…" />
        <select id="filter-curso">
          <option value="">Todos los cursos</option>
          <option value="3 Medio A">3 Medio A</option>
          <option value="3 Medio B">3 Medio B</option>
          <option value="3 Medio C">3 Medio C</option>
          <option value="3 Medio D">3 Medio D</option>
          <option value="3 Medio E">3 Medio E</option>
          <option value="3 Medio F">3 Medio F</option>
          <option value="Profesora">Profesora</option>
        </select>
        <select id="filter-mes">
          <option value="">Todos los meses</option>
        </select>
        <select id="filter-sort">
          <option value="date">Más recientes</option>
          <option value="likes">Más populares</option>
        </select>
        <button class="filter-clear" id="filter-clear">✕ Limpiar</button>
      </div>

      <div id="grid" class="photo-grid"></div>
      <div id="empty-state" class="empty-state">
        <div class="icon">🎞️</div>
        <p>Cargando fotos…</p>
      </div>
    </section>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar">✕</button>
      <img class="lightbox-img" id="lightbox-img" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>
  </div>
  <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Anterior">&#8592;</button>
  <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Siguiente">&#8594;</button>

  <script>
    const grid        = document.getElementById('grid');
    const emptyState  = document.getElementById('empty-state');
    const sseStatus   = document.getElementById('sse-status');
    const countBadge  = document.getElementById('count-badge');
    const filterAlumno = document.getElementById('filter-alumno');
    const filterCurso  = document.getElementById('filter-curso');
    const filterMes    = document.getElementById('filter-mes');
    const filterSort   = document.getElementById('filter-sort');
    const filterClear  = document.getElementById('filter-clear');

    // ── Likes ─────────────────────────────────
    const LIKED_KEY = 'pf-liked';
    function getLikedSet() {
      try { return new Set(JSON.parse(localStorage.getItem(LIKED_KEY) || '[]')); }
      catch { return new Set(); }
    }
    function saveLikedSet(s) {
      localStorage.setItem(LIKED_KEY, JSON.stringify([...s]));
    }
    let likedSet = getLikedSet();

    async function toggleLike(e, jobId) {
      e.stopPropagation();
      const btn = e.currentTarget;
      btn.disabled = true;
      try {
        const res  = await fetch(`/like/${jobId}`, { method: 'POST' });
        const data = await res.json();
        if (!data.success) return;
        const job = allJobs.find(j => j.id === jobId);
        if (job) job.like_count = data.count;
        if (data.liked) likedSet.add(jobId); else likedSet.delete(jobId);
        saveLikedSet(likedSet);
        btn.classList.toggle('liked', data.liked);
        btn.querySelector('span').textContent = data.count;
        if (filterSort.value === 'likes') applyFilters();
      } finally {
        btn.disabled = false;
      }
    }

    let allJobs      = [];   // all jobs from server
    let filteredJobs = [];   // currently visible (after filter)
    let lbIndex      = 0;    // current lightbox index in filteredJobs

    // ── Mes helpers ───────────────────────────
    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    function monthKey(dateStr) {
      const utc = dateStr.includes('Z') || dateStr.includes('+')
        ? dateStr : dateStr.replace(' ', 'T') + 'Z';
      const d = new Date(utc);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    function monthLabel(key) {
      const [y, m] = key.split('-');
      return `${MESES[parseInt(m,10)-1]} ${y}`;
    }
    function buildMonthSelect() {
      const current = filterMes.value;
      const keys = [...new Set(allJobs.map(j => monthKey(j.uploaded_at)))].sort().reverse();
      filterMes.innerHTML = '<option value="">Todos los meses</option>';
      keys.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = monthLabel(k);
        filterMes.appendChild(opt);
      });
      if (keys.includes(current)) filterMes.value = current;
    }

    // ── Helpers ──────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateCount() {
      const total    = allJobs.length;
      const filtered = filteredJobs.length;
      const isFiltering = filterAlumno.value.trim() || filterCurso.value || filterMes.value;
      countBadge.textContent = isFiltering
        ? `${filtered} de ${total} fotos`
        : (total === 1 ? '1 foto' : `${total} fotos`);
    }

    // ── Filters ───────────────────────────────
    function getFiltered() {
      const q   = filterAlumno.value.trim().toLowerCase();
      const cur = filterCurso.value;
      const mes = filterMes.value;
      let jobs  = allJobs.filter(j => {
        const ma = !q   || j.alumno.toLowerCase().includes(q);
        const mc = !cur || j.curso === cur;
        const mm = !mes || monthKey(j.uploaded_at) === mes;
        return ma && mc && mm;
      });
      if (filterSort.value === 'likes') {
        jobs = [...jobs].sort((a, b) => (b.like_count || 0) - (a.like_count || 0));
      }
      return jobs;
    }

    function applyFilters() {
      filteredJobs = getFiltered();
      renderGrid(filteredJobs);
      updateCount();
    }

    filterAlumno.addEventListener('input',  applyFilters);
    filterCurso.addEventListener('change',  applyFilters);
    filterMes.addEventListener('change',    applyFilters);
    filterSort.addEventListener('change', applyFilters);
    filterClear.addEventListener('click', () => {
      filterAlumno.value = '';
      filterCurso.value  = '';
      filterMes.value    = '';
      filterSort.value   = 'date';
      applyFilters();
    });

    // ── Render grid ───────────────────────────
    function renderGrid(jobs) {
      grid.innerHTML = '';
      if (!jobs.length) {
        emptyState.querySelector('p').textContent =
          allJobs.length ? 'Sin fotos para ese filtro.' : 'Aún no hay fotos.';
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');
      jobs.forEach((job, idx) => {
        const card = document.createElement('div');
        const src  = `/uploads/${job.filename}`;
        card.className = 'photo-card fade-in';
        card.style.cursor = 'pointer';
        card.dataset.idx = idx;
        card.innerHTML = `
          <img src="${src}" alt="${escHtml(job.alumno)} — ${escHtml(job.curso)}" loading="lazy" />
          <div class="photo-card-info">
            <div class="photo-card-info-text">
              <div class="photo-card-name">${escHtml(job.alumno)}</div>
              <div class="photo-card-course">${escHtml(job.curso)}</div>
            </div>
            <button class="like-btn${likedSet.has(job.id) ? ' liked' : ''}" title="Me gusta">
              ♥ <span>${job.like_count || 0}</span>
            </button>
          </div>
        `;
        card.querySelector('.like-btn').addEventListener('click', e => toggleLike(e, job.id));
        card.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(card);
      });
    }

    // ── Add / remove photos ───────────────────
    function addJob(job, prepend = false) {
      if (prepend) allJobs.unshift(job);
      else         allJobs.push(job);
      buildMonthSelect();
      applyFilters();

      if (prepend) {
        const first = grid.firstElementChild;
        if (first) {
          const badge = document.createElement('span');
          badge.className = 'photo-card-new';
          badge.textContent = 'NUEVO';
          first.appendChild(badge);
          setTimeout(() => badge.remove(), 8000);
        }
      }
    }

    function removeJob(id) {
      allJobs = allJobs.filter(j => j.id !== id);
      if (lightbox.classList.contains('open')) closeLightbox();
      buildMonthSelect();
      applyFilters();
    }

    // ── Load ──────────────────────────────────
    async function loadJobs() {
      try {
        const res  = await fetch('/api/jobs');
        const jobs = await res.json();
        allJobs = Array.isArray(jobs) ? jobs : [];
        buildMonthSelect();
        applyFilters();
      } catch {
        emptyState.querySelector('p').textContent = 'Error cargando la galería.';
        emptyState.classList.remove('hidden');
      }
    }

    // ── Lightbox ──────────────────────────────
    const lightbox        = document.getElementById('lightbox');
    const lightboxImg     = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxCounter = document.getElementById('lightbox-counter');
    const lightboxClose   = document.getElementById('lightbox-close');
    const lightboxBackdrop = document.getElementById('lightbox-backdrop');
    const lbPrev          = document.getElementById('lb-prev');
    const lbNext          = document.getElementById('lb-next');

    function showLightboxPhoto(idx) {
      const job = filteredJobs[idx];
      if (!job) return;
      lbIndex = idx;

      lightboxImg.classList.add('loading');
      const img = new Image();
      img.onload = () => {
        lightboxImg.src = img.src;
        lightboxImg.classList.remove('loading');
      };
      img.src = `/uploads/${job.filename}`;
      lightboxImg.alt = `${job.alumno} — ${job.curso}`;
      lightboxCaption.innerHTML = `${escHtml(job.alumno)} <span>· ${escHtml(job.curso)}</span>`;
      lightboxCounter.textContent = `${idx + 1} / ${filteredJobs.length}`;

      lbPrev.disabled = idx === 0;
      lbNext.disabled = idx === filteredJobs.length - 1;
    }

    function openLightbox(idx) {
      showLightboxPhoto(idx);
      lightbox.classList.add('open');
      lbPrev.style.display = lbNext.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbPrev.style.display = lbNext.style.display = 'none';
      document.body.style.overflow = '';
      setTimeout(() => { lightboxImg.src = ''; }, 250);
    }

    // Hide nav arrows initially
    lbPrev.style.display = lbNext.style.display = 'none';

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxBackdrop.addEventListener('click', closeLightbox);

    lbPrev.addEventListener('click', () => {
      if (lbIndex > 0) showLightboxPhoto(lbIndex - 1);
    });
    lbNext.addEventListener('click', () => {
      if (lbIndex < filteredJobs.length - 1) showLightboxPhoto(lbIndex + 1);
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft'  && lbIndex > 0) showLightboxPhoto(lbIndex - 1);
      if (e.key === 'ArrowRight' && lbIndex < filteredJobs.length - 1) showLightboxPhoto(lbIndex + 1);
    });

    // Touch swipe
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend',   (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 40) return;
      if (dx < 0 && lbIndex < filteredJobs.length - 1) showLightboxPhoto(lbIndex + 1);
      if (dx > 0 && lbIndex > 0)                        showLightboxPhoto(lbIndex - 1);
    });

    // ── SSE ───────────────────────────────────
    const sse = new EventSource('/events');

    sse.addEventListener('connected', () => {
      sseStatus.innerHTML = '<span class="dot dot-ok"></span> Conectado';
    });
    sse.addEventListener('new-photo', (e) => {
      addJob(JSON.parse(e.data), true);
    });
    sse.addEventListener('delete-photo', (e) => {
      removeJob(JSON.parse(e.data).id);
    });
    sse.onerror = () => {
      sseStatus.innerHTML = '<span class="dot dot-warn"></span> Reconectando…';
    };

    loadJobs();
  </script>

  <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
    <span class="theme-toggle-icon">🌸</span>
    <span class="theme-toggle-label">Modo sakura</span>
  </button>
  <script src="/js/theme.js"></script>
</body>
</html>
