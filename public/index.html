<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electivo de Fotografía y Multimedia</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script>if((localStorage.getItem('pf-theme')||'sakura')==='sakura')document.documentElement.classList.add('theme-sakura');</script>
  <style>
    /* Page-specific */
    .page-header {
      padding: 32px 0 20px;
      text-align: center;
    }
    .page-header .accent-line { margin: 10px auto 0; }
    .form-wrap { max-width: 440px; margin: 0 auto; padding-bottom: 40px; }
    .gallery-link {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 16px;
      padding: 10px;
      transition: opacity var(--trans);
    }
    .gallery-link:hover { opacity: 0.75; }
  </style>
</head>
<body class="page">

  <div class="container">
    <header class="page-header">
      <p style="font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Electivo de Fotografía y Multimedia</p>
      <h1 class="title">Sube tu trabajo</h1>
      <div class="accent-line"></div>
    </header>

    <main class="form-wrap">
      <div class="card">
        <form id="upload-form" class="space-y" novalidate>

          <!-- Upload zone -->
          <div>
            <label class="field-label" for="photo">Foto (JPG, PNG, WEBP)</label>
            <div class="upload-zone" id="upload-zone">
              <input type="file" id="photo" name="photo" accept="image/jpeg,image/png,image/webp" required />
              <img class="upload-preview-img" id="preview-img" alt="" />
              <div class="upload-preview-badge" id="preview-badge"></div>
              <div class="upload-placeholder" id="upload-placeholder">
                <div class="upload-icon">📷</div>
                <div class="upload-hint">
                  <strong>Toca para elegir una foto</strong><br>
                  o arrastra y suelta aquí<br>
                  <span style="font-size:0.78rem;opacity:0.7">JPG · PNG · WEBP</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Curso -->
          <div>
            <label class="field-label" for="curso-select">Curso</label>
            <select id="curso-select" required>
              <option value="" disabled selected>Selecciona tu curso…</option>
            </select>
          </div>

          <!-- Nombre (dinámico según curso) -->
          <div id="nombre-wrap" style="display:none">
            <label class="field-label" for="alumno-select">Tu nombre</label>
            <select id="alumno-select" required>
              <option value="" disabled selected>Selecciona tu nombre…</option>
            </select>
          </div>

          <!-- Aviso cuando no hay alumnos cargados -->
          <div id="no-alumnos-msg" class="error-msg hidden">
            No hay alumnos registrados aún. Pide a tu profesor que cargue la lista.
          </div>

          <!-- Error -->
          <div id="error-msg" class="error-msg hidden"></div>

          <!-- Submit -->
          <button id="submit-btn" type="submit" class="btn btn-primary">
            Subir foto
          </button>
        </form>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px;flex-wrap:wrap;gap:4px">
        <a href="/gallery" class="gallery-link" style="margin-top:0">Ver galería →</a>
        <div style="display:flex;gap:12px;align-items:center">
          <a href="/mis-fotos"    class="gallery-link" style="margin-top:0;font-size:0.85rem">Mis fotos</a>
          <a href="/foto-del-mes" class="gallery-link" style="margin-top:0;font-size:0.85rem">Foto del mes</a>
          <a href="/admin"        class="gallery-link" style="margin-top:0;color:var(--muted-2);font-size:0.8rem">Panel admin</a>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
    <span class="theme-toggle-icon">🌸</span>
    <span class="theme-toggle-label">Modo sakura</span>
  </button>

  <script src="/js/theme.js"></script>
  <script>
    const form         = document.getElementById('upload-form');
    const fileInput    = document.getElementById('photo');
    const uploadZone   = document.getElementById('upload-zone');
    const placeholder  = document.getElementById('upload-placeholder');
    const previewImg   = document.getElementById('preview-img');
    const previewBadge = document.getElementById('preview-badge');
    const errorMsg     = document.getElementById('error-msg');
    const submitBtn    = document.getElementById('submit-btn');
    const toast        = document.getElementById('toast');
    const cursoSelect  = document.getElementById('curso-select');
    const alumnoSelect = document.getElementById('alumno-select');
    const nombreWrap   = document.getElementById('nombre-wrap');
    const noAlumnosMsg = document.getElementById('no-alumnos-msg');

    let toastTimer;
    let allAlumnos = [];   // [{ id, nombre, curso }]

    // ── Device token ──────────────────────────
    // UUID v4 simple, no requiere crypto.randomUUID (compatibilidad móvil)
    function genUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    function getDeviceToken() {
      let t = localStorage.getItem('pf-device-token');
      if (!t) { t = genUUID(); localStorage.setItem('pf-device-token', t); }
      return t;
    }

    // ── Cargar alumnos ────────────────────────
    async function loadAlumnos() {
      try {
        const res = await fetch('/api/alumnos');
        allAlumnos = await res.json();
      } catch {
        allAlumnos = [];
      }

      if (!allAlumnos.length) {
        noAlumnosMsg.classList.remove('hidden');
        submitBtn.disabled = true;
        return;
      }

      // Poblar cursos únicos
      const cursos = [...new Set(allAlumnos.map(a => a.curso))].sort();
      cursoSelect.innerHTML = '<option value="" disabled selected>Selecciona tu curso…</option>';
      cursos.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        cursoSelect.appendChild(opt);
      });

      // Si el token ya está en localStorage con alumno_id guardado, preseleccionar
      const savedId = localStorage.getItem('pf-alumno-id');
      if (savedId) {
        const alumno = allAlumnos.find(a => String(a.id) === savedId);
        if (alumno) {
          cursoSelect.value = alumno.curso;
          buildAlumnoSelect(alumno.curso);
          alumnoSelect.value = String(alumno.id);
        }
      }
    }

    function buildAlumnoSelect(curso) {
      const lista = allAlumnos.filter(a => a.curso === curso);
      alumnoSelect.innerHTML = '<option value="" disabled selected>Selecciona tu nombre…</option>';
      lista.forEach(a => {
        const opt = document.createElement('option');
        opt.value = String(a.id); opt.textContent = a.nombre;
        alumnoSelect.appendChild(opt);
      });
      nombreWrap.style.display = lista.length ? '' : 'none';
    }

    cursoSelect.addEventListener('change', () => {
      buildAlumnoSelect(cursoSelect.value);
      nombreWrap.style.display = '';
      hideError();
    });

    alumnoSelect.addEventListener('change', () => {
      if (alumnoSelect.value) {
        localStorage.setItem('pf-alumno-id', alumnoSelect.value);
      }
      hideError();
    });

    // ── Preview ───────────────────────────────
    function showPreview(file) {
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewImg.classList.add('show');
      placeholder.classList.add('hidden');
      previewBadge.textContent = '📎 ' + file.name;
      previewBadge.classList.add('show');
    }
    function clearPreview() {
      previewImg.classList.remove('show');
      previewImg.src = '';
      placeholder.classList.remove('hidden');
      previewBadge.classList.remove('show');
      previewBadge.textContent = '';
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) showPreview(fileInput.files[0]);
      else clearPreview();
      hideError();
    });

    // ── Drag & drop ───────────────────────────
    uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && /^image\/(jpeg|png|webp)$/.test(file.type)) {
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        showPreview(file);
      }
    });

    // ── Error / toast ─────────────────────────
    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); }
    function hideError()    { errorMsg.classList.add('hidden'); }
    function showToast(msg) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
    }
    function hideToast() { toast.classList.remove('show'); }

    // ── Reset ─────────────────────────────────
    function resetForm() {
      fileInput.value = '';
      clearPreview();
      hideError();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Subir foto';
      // No resetear curso/alumno — el alumno probablemente sube otra foto del mismo curso
    }

    // ── Submit ────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const alumno_id = alumnoSelect.value;
      const photo     = fileInput.files[0];

      if (!photo)     return showError('Selecciona una foto antes de continuar.');
      if (!cursoSelect.value) return showError('Selecciona tu curso.');
      if (!alumno_id) return showError('Selecciona tu nombre.');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Subiendo…';

      const alumno = allAlumnos.find(a => String(a.id) === alumno_id);

      const fd = new FormData();
      fd.append('photo', photo);
      fd.append('alumno_id', alumno_id);
      fd.append('device_token', getDeviceToken());

      try {
        const res  = await fetch('/upload', { method: 'POST', body: fd });
        const json = await res.json();

        if (json.success) {
          showToast(`✓ ¡Foto subida! — ${alumno ? alumno.nombre : ''} · ${cursoSelect.value}`);
          toastTimer = setTimeout(() => { hideToast(); resetForm(); }, 2800);
        } else {
          showError(json.error || 'Error al subir la imagen.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Subir foto';
        }
      } catch {
        showError('Error de conexión. Intenta nuevamente.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Subir foto';
      }
    });

    loadAlumnos();
  </script>
</body>
</html>
