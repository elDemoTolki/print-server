<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Electivo de Fotografía y Multimedia</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script>if((localStorage.getItem('pf-theme')||'sakura')==='sakura')document.documentElement.classList.add('theme-sakura');</script>
  <style>
    body { background: var(--bg); }
    .login-wrap { max-width: 380px; width: 100%; }
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      display: block;
    }
    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .login-header p {
      color: var(--muted-2);
      font-size: 0.875rem;
      margin-top: 4px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color var(--trans);
    }
    .back-link:hover { color: var(--text); }
    #feedback {
      font-size: 0.85rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="center-page">
    <div class="login-wrap">
      <div class="login-header">
        <span class="icon">🔐</span>
        <h1>Panel Admin</h1>
        <p>Ingresa la contraseña del profesor</p>
      </div>

      <div class="card">
        <form id="login-form" class="space-y" novalidate>
          <div>
            <label class="field-label" for="password">Contraseña</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <div id="feedback"></div>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Entrar
          </button>
        </form>
      </div>

      <a href="/" class="back-link">← Volver al inicio</a>
    </div>
  </div>

  <script>
    const form      = document.getElementById('login-form');
    const password  = document.getElementById('password');
    const feedback  = document.getElementById('feedback');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      feedback.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verificando…';

      try {
        const res  = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password.value }),
        });
        const json = await res.json();

        if (json.success) {
          submitBtn.textContent = '✓ Entrando…';
          window.location.href = json.redirect || '/admin';
        } else {
          feedback.innerHTML = `<div class="error-msg">${json.error || 'Contraseña incorrecta.'}</div>`;
          password.value = '';
          password.focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Entrar';
        }
      } catch {
        feedback.innerHTML = '<div class="error-msg">Error de conexión. Intenta nuevamente.</div>';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>

  <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
    <span class="theme-toggle-icon">🌸</span>
    <span class="theme-toggle-label">Modo sakura</span>
  </button>
  <script src="/js/theme.js"></script>
</body>
</html>
